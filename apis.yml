aid: chuck-norris
name: Chuck Norris API
description: >
  Free REST API providing random Chuck Norris jokes, categories, and the
  ability to search the joke database with no authentication required. The
  service is hosted on AWS and supported by Jugendstil.io sponsorship,
  making it permanently free for developers. Responses are returned as JSON
  and include a joke identifier, URL, icon, and the joke text. Integrations
  are available for Slack and Facebook Messenger.
